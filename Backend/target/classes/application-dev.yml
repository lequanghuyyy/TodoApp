# ============================================================
# application-dev.yml — Development Profile
# Connects to a local MySQL instance.
# All sensitive values are read from environment variables.
#
# Set the following env vars before running (see .env.example):
#   DB_HOST, DB_PORT, DB_NAME, DB_USERNAME, DB_PASSWORD
#   CORS_ALLOWED_ORIGINS (optional, default: http://localhost:5173)
#
# TROUBLESHOOTING: Nếu app fail khi start với lỗi datasource/hikari,
# hãy kiểm tra MySQL đã chạy chưa:
#   Windows : net start MySQL80   (hoặc tên service MySQL của bạn)
#   Docker  : docker compose up -d db
# ============================================================

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:todoapp_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh&characterEncoding=UTF-8
    username: ${DATABASE_USERNAME:${DB_USERNAME:root}}
    password: ${DATABASE_PASSWORD:${DB_PASSWORD:}}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: TodoApp-Dev-Pool

      # maximum-pool-size: số connection tối đa trong pool.
      # Dev dùng 10 là đủ; tăng ở prod nếu có nhiều request đồng thời.
      maximum-pool-size: 10

      # minimum-idle: số connection luôn được duy trì dù không có traffic.
      # Giúp tránh độ trễ cold-start; đặt thấp (2) để tiết kiệm tài nguyên dev.
      minimum-idle: 2

      # connection-timeout (ms): thời gian tối đa chờ lấy connection từ pool.
      # Sau 30s không lấy được → ném SQLException, tránh request treo vô thời hạn.
      connection-timeout: 30000   # 30 giây

      # idle-timeout (ms): connection nhàn rỗi quá thời gian này sẽ bị đóng.
      # 10 phút là mức an toàn, nhỏ hơn wait_timeout của MySQL (mặc định 8h).
      idle-timeout: 600000        # 10 phút

      # max-lifetime (ms): tuổi thọ tối đa của mỗi connection, dù đang dùng hay không.
      # Đặt nhỏ hơn wait_timeout của MySQL để HikariCP chủ động đóng trước khi
      # MySQL phía server kill connection → tránh lỗi "connection closed unexpectedly".
      max-lifetime: 1800000       # 30 phút

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

# ---- CORS — đọc từ CorsConfig.java ----
# Đặt env var CORS_ALLOWED_ORIGINS để ghi đè khi cần nhiều origin.
# Mặc định chỉ cho phép Vite dev server (http://localhost:5173).
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ---- Actuator — expose health + info cho dev ----
# /api/actuator/health → {"status":"UP"} khi MySQL kết nối thành công.
# Nếu MySQL chưa chạy, status sẽ là "DOWN" với message rõ ràng trong log.
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always   # dev: hiện chi tiết DB, disk... để debug nhanh

# ---- Logging (verbose for development) ----
logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    com.example.todoapp: DEBUG
    # Hiện error rõ ràng khi datasource fail thay vì stack trace dài
    com.zaxxer.hikari: WARN
    org.springframework.boot.autoconfigure.jdbc: WARN
