# ============================================================
# application-test.yml — Test Profile
# Uses H2 in-memory database in MySQL compatibility mode.
# No external DB required; suitable for unit & integration tests.
# ============================================================

spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL;NON_KEYWORDS=VALUE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop   # fresh schema per test run
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect

  # Enable H2 console for debugging during test (optional)
  h2:
    console:
      enabled: true
      path: /h2-console

# ---- Logging (quieter for test output) ----
logging:
  level:
    root: WARN
    com.example.todoapp: INFO
    org.hibernate.SQL: DEBUG
