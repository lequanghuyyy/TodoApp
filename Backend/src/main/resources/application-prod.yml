
spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=true&requireSSL=true&serverTimezone=Asia/Ho_Chi_Minh&characterEncoding=UTF-8
    username: ${DATABASE_USERNAME:${DB_USERNAME}}
    password: ${DATABASE_PASSWORD:${DB_PASSWORD}}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: TodoApp-Prod-Pool
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate   
    show-sql: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

# ---- Logging ----
logging:
  level:
    root: WARN
    com.example.todoapp: INFO

# ---- Server Error Config ----
server:
  error:
    include-stacktrace: never
    include-message: never

# ---- Swagger / OpenAPI ----
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

