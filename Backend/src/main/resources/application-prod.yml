# ============================================================
# application-prod.yml — Production Profile (Placeholder)
# All values MUST be supplied via environment variables or
# a secret management tool (Vault, AWS Secrets Manager, etc.)
#
# NEVER commit real credentials to this file.
# ============================================================

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=true&requireSSL=true&serverTimezone=Asia/Ho_Chi_Minh&characterEncoding=UTF-8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: TodoApp-Prod-Pool
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate    # NEVER use update/create in production
    show-sql: false

# ---- Actuator: restrict exposure in production ----
management:
  endpoints:
    web:
      exposure:
        include: health,info

# ---- Logging ----
logging:
  level:
    root: WARN
    com.example.todoapp: INFO
